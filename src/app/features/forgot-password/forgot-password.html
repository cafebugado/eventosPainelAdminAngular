<div class="login-page">

  <div class="login-bg" aria-hidden="true">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="bg-wave"></div>
    <ul class="bg-particles">
      <li></li><li></li><li></li><li></li><li></li>
      <li></li><li></li><li></li><li></li><li></li>
    </ul>
  </div>

  <div class="login-container">
    <mat-card class="login-card">
      <mat-card-header class="login-card-header">
        <img src="logoEventosCafeBugado.png" alt="Eventos Café Bugado" class="login-logo" />
        <mat-card-subtitle class="login-subtitle">Painel Administrativo</mat-card-subtitle>
      </mat-card-header>

      <div class="login-divider"></div>

      <mat-card-content class="login-content">
        <div class="view-header">
          <a routerLink="/admin" class="back-btn" aria-label="Voltar">
            <mat-icon>arrow_back</mat-icon>
          </a>
          <h2 class="view-title">Recuperar senha</h2>
        </div>

        <p class="view-description">Informe seu email e enviaremos um link para redefinir sua senha.</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" autocomplete="email" />
            @if (form.controls.email.hasError('required')) {
              <mat-error>O email é obrigatório</mat-error>
            }
            @if (form.controls.email.hasError('pattern')) {
              <mat-error>Informe um email válido</mat-error>
            }
          </mat-form-field>

          <button mat-flat-button type="submit" class="full-width submit-button">
            <span class="submit-label">
              <mat-icon class="submit-icon">send</mat-icon>
              Enviar link
            </span>
          </button>

          <p class="auth-switch">
            Lembrou a senha?
            <a routerLink="/admin" class="auth-switch-link">Entrar</a>
          </p>

        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
