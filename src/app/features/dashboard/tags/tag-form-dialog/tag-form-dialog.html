<h2 mat-dialog-title>{{ isEdit ? 'Editar Tag' : 'Nova Tag' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="tag-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="nome" />
      @if (form.controls.nome.hasError('required')) {
        <mat-error>O nome é obrigatório</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cor</mat-label>
      <input matInput type="color" formControlName="cor" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-flat-button class="secondary-action-button" (click)="onSubmit()">Salvar</button>
</mat-dialog-actions>
